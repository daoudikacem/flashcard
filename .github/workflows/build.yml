name: Android CI

on:
  push:
    branches: [ "main" ] # تأكد أن هذا هو اسم فرعك (main أو master)
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # تحديث لـ v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4 # تحديث لـ v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # هذا هو التحديث المطلوب لحل الخطأ
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
