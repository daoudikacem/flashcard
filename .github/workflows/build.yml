name: Android CI

on:
  push:
    branches: [ "main", "master" ] # سيعمل على كلا الاسمين لضمان النجاح
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # تحديث للإصدار الرابع
    
    - name: set up JDK 17
      uses: actions/setup-java@v4 # تحديث للإصدار الرابع
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # الإصدار المطلوب لحل المشكلة
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
